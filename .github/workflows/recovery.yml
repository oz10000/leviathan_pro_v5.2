name: Recovery
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install -r requirements.txt
      - name: Run Recovery
        env:
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_SECRET_KEY: ${{ secrets.OKX_SECRET_KEY }}
          OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
          LEVIATHAN_MODE: testnet
        run: python runtime/recovery_manager.py
      - name: Commit recovery state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
          git add runtime/
          git commit -m "Recovery" || echo "No changes"
          git push || echo "Push failed"
