name: Leviathan Runtime 24/7

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    paths-ignore:
      - 'runtime/state.json'
      - 'runtime/trades.csv'
      - 'runtime/logs/**'
      - 'runtime/metrics.json'
      - 'runtime/runtime_control.json'

jobs:
  run-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    concurrency:
      group: leviathan-runtime
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache market data
        uses: actions/cache@v4
        with:
          path: runtime/cache
          key: market-data-${{ github.run_number }}
          restore-keys: |
            market-data-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure runtime directories exist
        run: |
          mkdir -p runtime/logs
          mkdir -p runtime/cache
          touch runtime/logs/.gitkeep

      - name: Run orchestrator
        env:
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_API_SECRET: ${{ secrets.OKX_API_SECRET }}
          OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
          MAX_CYCLES: 8
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/leviathan_edge_core
        run: python runtime/orchestrator.py

      - name: Commit and push state changes
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 Runtime persist [skip ci]"
          file_pattern: "runtime/state.json runtime/trades.csv runtime/metrics.json runtime/logs/"
          commit_user_name: "Leviathan Bot"
          commit_user_email: "bot@leviathan.local"
