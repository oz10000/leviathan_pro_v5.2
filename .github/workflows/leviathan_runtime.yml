name: Leviathan Runtime 24/7

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    permissions:
      contents: write
    concurrency:
      group: leviathan-runtime
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure runtime dirs
        run: |
          mkdir -p runtime/logs runtime/cache
          touch runtime/logs/.gitkeep

      - name: Run Velocity-Momentum Orchestrator
        env:
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_API_SECRET: ${{ secrets.OKX_API_SECRET }}
          OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
          MAX_CYCLES: 8
          DEMO_DIAGNOSTIC_MODE: ${{ vars.DEMO_DIAGNOSTIC_MODE || 'False' }}
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/leviathan_edge_core
        run: python runtime/orchestrator.py

      - name: Commit state changes
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 Runtime persist [skip ci]"
          file_pattern: "runtime/state.json runtime/trades.csv runtime/metrics.json runtime/logs/ runtime/metrics_snapshots.json"
          commit_user_name: "Leviathan Bot"
          commit_user_email: "bot@leviathan.local"
