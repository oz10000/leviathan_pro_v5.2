name: Leviathan Runtime 24/7

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    concurrency:
      group: leviathan-runtime
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: runtime/runtime_state.json
          key: leviathan-state-${{ github.run_id }}
          restore-keys: leviathan-state-

      - name: Run orchestrator (24/7 loop)
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/leviathan_edge_core
        run: python runtime/orchestrator.py

      - name: Save state
        uses: actions/cache@v4
        with:
          path: runtime/runtime_state.json
          key: leviathan-state-${{ github.run_id }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: leviathan-runtime-artifacts
          path: |
            runtime/logs/
            runtime/state.json
            runtime/trades.csv
            runtime/metrics.json
            runtime/metrics_snapshots.json
            runtime/heartbeat.log
            runtime/e2e_audit.log
            runtime/watchdog.log
            runtime/runtime_control.json
