name: Leviathan Runtime
on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'
concurrency:
  group: leviathan-runtime
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Run Orchestrator
        env:
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_SECRET_KEY: ${{ secrets.OKX_SECRET_KEY }}
          OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
          LEVIATHAN_MODE: testnet
          MAX_CYCLES: 10
        run: python runtime/orchestrator.py
      - name: Commit runtime state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
          git add runtime/
          git commit -m "Runtime state" || echo "No changes"
          git push || echo "Push failed"
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: leviathan-state
          path: runtime/
